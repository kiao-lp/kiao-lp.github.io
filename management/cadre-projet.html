<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadre projet</title>
  <style>
    /* Reset & base */
    *, *::before, *::after { box-sizing: border-box; }
    html { font-size: 16px; line-height: 1.6; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #1f2328;
      background: #fff;
      margin: 0;
      padding: 2em;
      max-width: 980px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Headings */
    h1, h2, h3, h4, h5, h6 { margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; color: #1f2328; }
    h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid #d1d9e0; }
    h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid #d1d9e0; }
    h3 { font-size: 1.25em; }
    h4 { font-size: 1em; }

    /* Links */
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Paragraphs & lists */
    p { margin: 0 0 16px; }
    ul, ol { padding-left: 2em; margin-bottom: 16px; }
    li { margin-bottom: 4px; }

    /* Code */
    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.85em;
      background: #f6f8fa;
      border-radius: 6px;
      padding: 0.2em 0.4em;
    }
    pre {
      background: #f6f8fa;
      border-radius: 6px;
      padding: 16px;
      overflow: auto;
      line-height: 1.45;
      margin-bottom: 16px;
    }
    pre code { background: none; padding: 0; font-size: 0.85em; }

    /* Blockquotes */
    blockquote {
      margin: 0 0 16px;
      padding: 0 1em;
      color: #656d76;
      border-left: 4px solid #d1d9e0;
    }

    /* Tables */
    table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
    th, td { border: 1px solid #d1d9e0; padding: 6px 13px; text-align: left; }
    th { background: #f6f8fa; font-weight: 600; }
    tr:nth-child(even) { background: #f6f8fa; }

    /* Horizontal rules */
    hr { border: none; border-top: 1px solid #d1d9e0; margin: 24px 0; }

    /* Images & SVG */
    img, svg { max-width: 100%; height: auto; }

    /* Diagram containers */
    .plantuml, .mermaid-diagram { text-align: center; margin: 16px 0; }

    /* Callout components */
    .callout {
      border-radius: 6px;
      border-left: 4px solid;
      padding: 12px 16px;
      margin: 16px 0;
    }
    .callout-title { font-weight: 600; margin-bottom: 4px; }
    .callout-body > p:last-child { margin-bottom: 0; }
    .callout-note    { border-color: #0969da; background: #ddf4ff; }
    .callout-tip     { border-color: #1a7f37; background: #dafbe1; }
    .callout-warning { border-color: #bf8700; background: #fff8c5; }
    .callout-danger  { border-color: #cf222e; background: #ffebe9; }

    /* Bold & emphasis */
    strong { font-weight: 600; color: #1f2328; }

    /* Floating logo */
    .site-logo {
      position: fixed;
      top: 1.5em;
      right: 1.5em;
      z-index: 100;
    }
    .site-logo img { height: 40px; width: auto; display: block; }

    /* Full-width breakout for wide components */
    .full-width-breakout {
      width: 100vw;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      padding: 0 3em;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { padding: 1em; font-size: 14px; }
    }

    @media print {
      body { max-width: none; padding: 0; }
      h1, h2, h3, h4, h5, h6 { page-break-after: avoid; }
      pre { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
<a class="site-logo" href="https://www.kiao-lp.app/" title="Kiao">
  <img src="https://www.kiao-lp.app/BrainK.jpg" alt="Kiao" />
</a>
<h1 id="cadre-projet">Cadre projet</h1>
<div class="archdia-diagram">
<?xml version="1.0" standalone="no"?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 925 768" width="925" height="768" class="archdia-svg">
<style>

/* ─── ArchDia Export Styles ────────────────────────────────────────── */

.archdia-svg {
    background-color: #f9fafb;
}

/* --- Components --- */

.archdia-component-box {
    fill: #e8eaf0;
    stroke: #c8ccd4;
    stroke-width: 1.5;
}

.archdia-component-shape {
    fill: #e8eaf0;
    stroke: #111827;
    stroke-width: 1.5;
}

.archdia-component-label {
    fill: #111827;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    pointer-events: none;
}

.archdia-component-stereotype {
    fill: #111827;
    font-family: 'Inter', 'Segoe UI', sans-serif;
}

/* --- Containers --- */

.archdia-container-box {
    fill: #e8eaf0;
    fill-opacity: 0.32;
    stroke: #c8ccd4;
    stroke-width: 1.5;
    stroke-dasharray: 6 3;
}

.archdia-container-label {
    fill: #6b7280;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    font-weight: 600;
    pointer-events: none;
}

.archdia-container-stereotype {
    fill: #6b7280;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    font-weight: 600;
}

.archdia-container-zone .archdia-container-box {
    fill-opacity: 0.15;
    stroke: #c8ccd4;
    stroke-dasharray: none;
}

.archdia-container-district .archdia-container-box {
    fill-opacity: 0.4;
    stroke: #c8ccd4;
    stroke-dasharray: none;
}

.archdia-container-trust .archdia-container-box {
    fill: transparent;
    fill-opacity: 0;
    stroke: #ef4444;
    stroke-width: 3;
    stroke-dasharray: 10 5;
}

.archdia-container-trust .archdia-container-label {
    fill: #ef4444;
}

.archdia-container-trust .archdia-container-stereotype {
    fill: #ef4444;
}

.archdia-component-block .archdia-component-box {
    fill-opacity: 1;
    stroke: #c8ccd4;
}

/* --- Relations --- */

.archdia-relation-line {
    stroke: #6b7280;
    stroke-width: 1.2;
}

.archdia-relation-label {
    fill: #6b7280;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    pointer-events: none;
}

.archdia-arrowhead {
    fill: #6b7280;
    color: #6b7280;
}

/* --- Class Members --- */

.archdia-class-separator {
    stroke: #c8ccd4;
    stroke-width: 1;
}

.archdia-class-member {
    fill: #111827;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    pointer-events: none;
}

.archdia-class-member-static {
    text-decoration: underline;
}

.archdia-class-member-abstract {
    font-style: italic;
}

.archdia-class-visibility {
    fill: #6b7280;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
}

/* --- Drag-and-drop --- */

.archdia-draggable {
    cursor: grab;
}

.archdia-dragging .archdia-draggable {
    cursor: grabbing;
}

.archdia-dragging {
    user-select: none;
}

/* --- Floating Editor --- */

.archdia-editable {
    cursor: text;
}

.archdia-description-editor-container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 8px;
    background: rgba(20, 24, 36, 0.95);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid #c8ccd4;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    box-sizing: border-box;
}

.archdia-description-editor-textarea {
    flex: 1;
    width: 100%;
    resize: none;
    border: none;
    background: transparent;
    color: #111827;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    outline: none;
}

.archdia-description-editor-textarea::placeholder {
    color: #6b7280;
    opacity: 0.7;
}

/* --- Markdown Tooltips --- */

.archdia-tooltip {
    pointer-events: none;
}

.archdia-tooltip-body {
    width: max-content;
    max-width: 300px;
    max-height: 400px;
    overflow: auto;
    padding: 10px 14px;
    background: #f9fafb;
    border: 1px solid #c8ccd4;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    font-family: 'Inter', 'Segoe UI', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    color: #111827;
    box-sizing: border-box;
    white-space: normal;
}

.archdia-tooltip-body p {
    margin: 0 0 8px 0;
}
.archdia-tooltip-body p:last-child {
    margin-bottom: 0;
}
.archdia-tooltip-body h1, .archdia-tooltip-body h2,
.archdia-tooltip-body h3, .archdia-tooltip-body h4,
.archdia-tooltip-body h5, .archdia-tooltip-body h6 {
    margin: 0 0 6px 0;
    font-size: 14px;
    font-weight: 600;
    color: #111827;
}
.archdia-tooltip-body ul, .archdia-tooltip-body ol {
    margin: 0 0 8px 0;
    padding-left: 20px;
}
.archdia-tooltip-body li {
    margin-bottom: 2px;
}
.archdia-tooltip-body code {
    background: #e8eaf0;
    padding: 1px 4px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12px;
}
.archdia-tooltip-body strong {
    font-weight: 600;
}
.archdia-tooltip-body a {
    color: #2563eb;
    text-decoration: none;
}

/* --- Inline CSS-only Tooltips (for static SVG export) ---
   Base rule hides them. Export CSS enables via :has() hover rules embedded in the SVG.
   Browser CSS overrides with !important so the React overlay handles tooltips instead. */

.archdia-inline-tooltip {
    display: none;
    pointer-events: none;
}


</style>
<rect x="0" y="0" width="925" height="768" fill="#f9fafb" /><defs><marker id="archdia-arrowhead-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="currentColor" class="archdia-arrowhead"></polygon></marker><marker id="archdia-arrowhead-triangle" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto"><polygon points="0 0, 10 5, 0 10" fill="none" stroke="currentColor" class="archdia-arrowhead"></polygon></marker><marker id="archdia-arrowhead-diamond" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 4, 6 0, 12 4, 6 8" fill="none" stroke="currentColor" class="archdia-arrowhead"></polygon></marker><marker id="archdia-arrowhead-diamond-filled" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 4, 6 0, 12 4, 6 8" fill="currentColor" class="archdia-arrowhead"></polygon></marker></defs></svg>
</div>
</body>
</html>
