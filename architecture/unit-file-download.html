    /* Reset & base */
    *, *::before, *::after { box-sizing: border-box; }

      background: #fff;
      margin: 0;
      padding: 2em;
      max-width: 980px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Headings */
    h1, h2, h3, h4, h5, h6 { margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; color: #1f2328; }
    h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid #d1d9e0; }
    h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid #d1d9e0; }
    h3 { font-size: 1.25em; }
    h4 { font-size: 1em; }

    /* Links */
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Paragraphs & lists */
    p { margin: 0 0 16px; }
    ul, ol { padding-left: 2em; margin-bottom: 16px; }
    li { margin-bottom: 4px; }

    /* Code */
    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.85em;
      background: #f6f8fa;
      border-radius: 6px;
      padding: 0.2em 0.4em;
    }
    pre {
      background: #f6f8fa;
      border-radius: 6px;
      padding: 16px;
      overflow: auto;
      line-height: 1.45;
      margin-bottom: 16px;
    }
    pre code { background: none; padding: 0; font-size: 0.85em; }

    /* Blockquotes */
    blockquote {
      margin: 0 0 16px;
      padding: 0 1em;
      color: #656d76;
      border-left: 4px solid #d1d9e0;
    }

    /* Tables */
    table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
    th, td { border: 1px solid #d1d9e0; padding: 6px 13px; text-align: left; }
    th { background: #f6f8fa; font-weight: 600; }
    tr:nth-child(even) { background: #f6f8fa; }

    /* Horizontal rules */
    hr { border: none; border-top: 1px solid #d1d9e0; margin: 24px 0; }

    /* Images & SVG */
    img, svg { max-width: 100%; height: auto; }

    /* Diagram containers */
    .plantuml, .mermaid-diagram { text-align: center; margin: 16px 0; }

    /* Callout components */
    .callout {
      border-radius: 6px;
      border-left: 4px solid;
      padding: 12px 16px;
      margin: 16px 0;
    }
    .callout-title { font-weight: 600; margin-bottom: 4px; }
    .callout-body > p:last-child { margin-bottom: 0; }
    .callout-note    { border-color: #0969da; background: #ddf4ff; }
    .callout-tip     { border-color: #1a7f37; background: #dafbe1; }
    .callout-warning { border-color: #bf8700; background: #fff8c5; }
    .callout-danger  { border-color: #cf222e; background: #ffebe9; }

    /* Bold & emphasis */
    strong { font-weight: 600; color: #1f2328; }

    /* Floating logo */
    .site-logo {
      position: fixed;
      top: 1.5em;
      right: 1.5em;
      z-index: 100;
    }
    .site-logo img { height: 40px; width: auto; display: block; }

    /* Responsive */
    @media (max-width: 768px) {
      body { padding: 1em; font-size: 14px; }
    }

    @media print {
      body { max-width: none; padding: 0; }
      h1, h2, h3, h4, h5, h6 { page-break-after: avoid; }
      pre { page-break-inside: avoid; }
    }
